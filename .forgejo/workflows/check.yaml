on:
  pull_request:
  push:
    paths:
      - 'flake.lock'
      - '**/*.nix'
    branches:
      - main
  workflow_dispatch:

jobs:
  eval:
    runs-on: native
    outputs:
      to-check: ${{ steps.eval.outputs.to-check }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Eval checks
        id: eval
        run: |
          nix-eval-jobs \
            --option eval-cache false \
            --workers 32 \
            --max-memory-size 4096 \
            --option accept-flake-config true \
            --force-recurse \
            --check-cache-status \
            --show-trace \
            --flake '.#checks.x86_64-linux' \
            > evaled

          echo "to-check=$(
            jq -s -r -c \
            'map(select(.isCached == false) | { name: .name, path: .drvPath, attr: ([.system] + .attrPath | join (".")) })' \
            ./evaled
          )" > $FORGEJO_OUTPUT

  check:
    name: Check ${{ matrix.checks.name }}
    runs-on: native
    needs: eval
    strategy:
      matrix:
        checks: ${{ fromJSON(needs.eval.outputs.to-check) }}
    steps:
      - name: Check outputs
        id: check
        run: |-
          nix build \
            -L \
            --show-trace \
            --keep-going \
            --max-silent-time 1200 \
            --out-link "result-${{ matrix.checks.attr }}" \
            "${{ matrix.checks.path }}"'^*'
