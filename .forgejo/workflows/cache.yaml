on:
  pull_request:
  push:
    paths:
      - 'flake.lock'
      - '**/*.nix'
    branches:
      - main
  workflow_dispatch:
  workflow_call:

jobs:
  eval:
    runs-on: native
    outputs:
      to-cache: ${{ steps.eval.outputs.to-cache }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Eval checks
        id: eval
        run: |
          nix-eval-jobs \
            --option eval-cache false \
            --workers 32 \
            --max-memory-size 4096 \
            --option accept-flake-config true \
            --force-recurse \
            --check-cache-status \
            --show-trace \
            --flake '.#packages.x86_64-linux' \
            > evaled

          echo "to-cache=$(
            jq -s -r -c \
            'map(select(.isCached == false) | { name: .name, path: .drvPath, attr: ([.system] + .attrPath | join (".")) })' \
            ./evaled
          )" > $FORGEJO_OUTPUT

  cache:
    name: Build ${{ matrix.builds.name }}
    runs-on: native
    needs: eval
    strategy:
      matrix:
        builds: ${{ fromJSON(needs.eval.outputs.to-cache) }}
    steps:
      - name: Check outputs
        id: check
        run: |-
          nix build \
            -L \
            --show-trace \
            --keep-going \
            --max-silent-time 1200 \
            --out-link "result-${{ matrix.builds.attr }}" \
            "${{ matrix.builds.path }}"'^*'

      - name: Upload to cache
        env:
          CACHE_TOKEN: ${{ secrets.CACHE_TOKEN }}
        run: |-
          attic login thelessone https://binarycache.theless.one "$CACHE_TOKEN"
          attic push global "$(readlink -f "result-${{ matrix.checks.attr }}")"
          attic push global "${{ matrix.checks.path }}"
